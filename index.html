<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CJEU Privacy Citation Network</title>
  <style>
    :root {
      --bg-dark: #1e3a5f;
      --bg-darker: #152d4a;
      --bg-hover: #2a4f7c;
      --accent: #5ba3d9;
      --text-light: #cce0f5;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      font-size: .82rem;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #f5f5f5;
    }

    /* Sidebar */
    #sidebar {
      width: 260px;
      background: var(--bg-dark);
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar h1 {
      font-size: .9rem;
      line-height: 1.3;
      padding: 1rem;
      background: var(--bg-darker);
      border-bottom: 1px solid var(--bg-hover);
    }

    #sidebar h2 {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--accent);
      padding: .8rem 1rem .3rem;
    }

    #queries {
      flex: 1;
      overflow-y: auto;
    }

    .query-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: .6rem 1rem;
      background: none;
      border: none;
      border-left: 3px solid transparent;
      color: var(--text-light);
      cursor: pointer;
      line-height: 1.4;
    }

    .query-btn:hover,
    .query-btn.active {
      background: var(--bg-hover);
    }

    .query-btn.active {
      border-left-color: var(--accent);
      color: #fff;
    }

    /* Main */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #loading-bar {
      height: 3px;
      display: none;
      background: linear-gradient(90deg, var(--accent) 30%, var(--bg-dark) 60%, var(--accent));
      background-size: 200%;
      animation: shimmer 1.2s linear infinite;
    }

    @keyframes shimmer {
      to {
        background-position: -200%;
      }
    }

    #editor-area {
      padding: .85rem 1rem;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }

    #editor-area label {
      font-size: .75rem;
      font-weight: 700;
      color: #555;
      display: block;
      margin-bottom: .35rem;
    }

    #sort-controls {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #ddd;
    }

    #sort-controls h3 {
      font-size: .75rem;
      font-weight: 700;
      color: #555;
      margin-bottom: .5rem;
    }

    .sort-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: .4rem;
      font-size: .75rem;
    }

    .sort-item input[type="checkbox"] {
      cursor: pointer;
    }

    .sort-item select {
      padding: .2rem .4rem;
      font-size: .75rem;
      border: 1px solid #c8d0dd;
      border-radius: 3px;
    }

    .sort-item button {
      padding: .2rem .4rem;
      font-size: .7rem;
      background: var(--bg-dark);
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin-left: auto;
    }

    .sort-item button:hover {
      background: var(--bg-hover);
    }

    #sparql-input {
      width: 100%;
      height: 130px;
      resize: vertical;
      font-family: monospace;
      border: 1px solid #c8d0dd;
      border-radius: 4px;
      padding: .5rem;
      line-height: 1.5;
    }

    #sparql-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    #toolbar {
      margin-top: .5rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    #run-btn {
      padding: .4rem 1.1rem;
      background: var(--bg-dark);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #run-btn:hover:not(:disabled) {
      background: var(--bg-hover);
    }

    #run-btn:disabled {
      background: #aaa;
      cursor: default;
    }

    #status {
      color: #666;
    }

    /* Results */
    #results-area {
      flex: 1;
      overflow: auto;
      padding: 1rem;
    }

    #no-results {
      color: #888;
      font-style: italic;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th {
      background: var(--bg-dark);
      color: #fff;
      padding: .45rem .75rem;
      text-align: left;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }

    td {
      padding: .38rem .75rem;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    tr:hover td {
      background: #f0f6ff;
    }

    .uri a {
      color: var(--bg-dark);
      text-decoration: none;
      font-family: monospace;
      font-size: .75rem;
    }

    .uri a:hover {
      text-decoration: underline;
    }

    .id-link {
      color: var(--accent) !important;
      cursor: pointer;
    }

    .id-link:hover {
      text-decoration: underline;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .err {
      color: #c0392b;
    }
  </style>
</head>

<body>

  <div id="sidebar">
    <h1>CJEU Privacy<br>Citation Network</h1>
    <h2>Saved Queries</h2>
    <div id="queries"></div>
  </div>

  <div id="main">
    <div id="loading-bar"></div>
    <div id="editor-area">
      <label for="sparql-input">SPARQL &mdash; Ctrl+Enter to run</label>
      <textarea id="sparql-input" spellcheck="false"></textarea>
      <div id="sort-controls">
        <h3>Order By</h3>
        <div id="sort-items"></div>
      </div>
      <div id="toolbar">
        <button id="run-btn" disabled>Run</button>
        <span id="status">Loading Comunica engine…</span>
      </div>
    </div>
    <div id="results-area">
      <p id="no-results">Select a saved query or write your own, then click Run.</p>
    </div>
  </div>

  <script type="module">
    "use strict";

    import oxiInit, * as oxigraph from "https://cdn.jsdelivr.net/npm/oxigraph@0.5.6/web.js";

    const TTL_URL = new URL("citations.ttl", window.location.href).href;

    const PFX = `PREFIX cit:     <https://example.org/cjeu/citation#>
PREFIX eli:     <http://data.europa.eu/eli/ontology#>
PREFIX dcterms: <http://purl.org/dc/terms/>
PREFIX rdf:     <http://www.w3.org/1999/02/22-rdf-syntax-ns#>

`;

    const SAVED_QUERIES = [
      {
        title: "Most-cited paragraphs",
        sparql: PFX +
          `SELECT ?cited ?paragraph ?title (COUNT(?cit) AS ?times_cited)
WHERE {
  ?cit a cit:Citation ; cit:citesParagraph ?p .
  ?p cit:ofJudgment ?cited ; cit:paragraphNumber ?paragraph .
  OPTIONAL { ?cited dcterms:title ?title }
}
GROUP BY ?cited ?paragraph ?title
ORDER BY DESC(?times_cited)
LIMIT 50`,
      },
      {
        title: "Most-cited cases (distinct sources)",
        sparql: PFX +
          `SELECT ?cited ?title (COUNT(DISTINCT ?src) AS ?citing_cases)
WHERE {
  ?cit a cit:Citation ;
       cit:sourceJudgment ?src ;
       cit:citedJudgment ?cited .
  OPTIONAL { ?cited dcterms:title ?title }
}
GROUP BY ?cited ?title
ORDER BY DESC(?citing_cases)
LIMIT 50`,
      },
      {
        title: "Most-cited cases",
        sparql: PFX +
          `SELECT ?cited ?title
       (COUNT(?cit) AS ?total_citations)
       (COUNT(DISTINCT ?src) AS ?citing_cases)
WHERE {
  ?cit a cit:Citation ;
       cit:sourceJudgment ?src ;
       cit:citedJudgment ?cited .
  OPTIONAL { ?cited dcterms:title ?title }
}
GROUP BY ?cited ?title
ORDER BY DESC(?total_citations)
LIMIT 50`,
      },
      {
        title: "Most-citing source paragraphs",
        sparql: PFX +
          `SELECT ?src ?srcPara ?text (COUNT(?cit) AS ?outgoing)
WHERE {
  ?cit a cit:Citation ; cit:sourceParagraph ?sp .
  ?sp cit:ofJudgment ?src ; cit:paragraphNumber ?srcPara .
  OPTIONAL { ?sp cit:text ?text }
}
GROUP BY ?src ?srcPara ?text
ORDER BY DESC(?outgoing)
LIMIT 50`,
      },
      {
        title: "Citations by source case",
        sparql: PFX +
          `SELECT ?src (COUNT(?cit) AS ?citations_made)
WHERE {
  ?cit a cit:Citation ; cit:sourceJudgment ?src .
}
GROUP BY ?src
ORDER BY DESC(?citations_made)`,
      },
      {
        title: "Paragraph citation detail",
        sparql: PFX +
          `SELECT ?src ?srcPara ?srcTextCleaned ?cited ?citedPara ?citedTextCleaned
WHERE {
  ?cit a cit:Citation ;
       cit:sourceParagraph ?sp ;
       cit:citesParagraph ?tp .
  ?sp cit:ofJudgment ?src ; cit:paragraphNumber ?srcPara .
  ?tp cit:ofJudgment ?cited ; cit:paragraphNumber ?citedPara .
  OPTIONAL { ?sp cit:text ?srcText }
  OPTIONAL { ?tp cit:text ?citedText }
  BIND(COALESCE(?srcText, "") AS ?srcTextCleaned)
  BIND(COALESCE(?citedText, "") AS ?citedTextCleaned)
  FILTER(BOUND(?srcText) || BOUND(?citedText))
}
GROUP BY ?src ?srcPara ?srcTextCleaned ?cited ?citedPara ?citedTextCleaned
LIMIT 200`,
      },
    ];

    /* ── Filter-query builder ── */
    function isEcliUri(uri) {
      try {
        const p = new URL(uri).searchParams.get("uri");
        return p && /^(?:ecli:|CELEX:)/i.test(p);
      } catch { return false; }
    }

    function buildFilterQuery(uri) {
      const url = new URL(uri);
      const isPara = url.hash !== "";
      const u = `<${uri}>`;

      if (isPara) {
        return PFX +
`SELECT ?src ?cited ?srcPara ?srcText ?citedPara ?citedText
WHERE {
  ?cit a cit:Citation .
  { ?cit cit:sourceParagraph ${u} }
  UNION
  { ?cit cit:citesParagraph ${u} }
  OPTIONAL { ?cit cit:sourceJudgment ?src }
  OPTIONAL { ?cit cit:citedJudgment ?cited }
  OPTIONAL {
    ?cit cit:sourceParagraph ?sp .
    ?sp cit:paragraphNumber ?srcPara .
    OPTIONAL { ?sp cit:text ?srcText }
  }
  OPTIONAL {
    ?cit cit:citesParagraph ?tp .
    ?tp cit:paragraphNumber ?citedPara .
    OPTIONAL { ?tp cit:text ?citedText }
  }
}
ORDER BY ?src ?cited`;
      } else {
        return PFX +
`SELECT ?src ?srcPara ?cited ?citedPara (COUNT(?cit) AS ?occurrences)
WHERE {
  ?cit a cit:Citation ;
       cit:sourceJudgment ?src ;
       cit:citedJudgment ?cited .
  OPTIONAL { ?cit cit:sourceParagraph ?sp . ?sp cit:paragraphNumber ?srcPara }
  OPTIONAL { ?cit cit:citesParagraph ?tp . ?tp cit:paragraphNumber ?citedPara }
  FILTER (?src = ${u} || ?cited = ${u})
}
GROUP BY ?src ?srcPara ?cited ?citedPara
ORDER BY DESC(?occurrences)`;
      }
    }

    /* ── Sort builder ── */
    function extractSelectVars(sparql) {
      const selectMatch = sparql.match(/SELECT\s+(.*?)(?:WHERE|where)/is);
      if (!selectMatch) return [];
      const selectPart = selectMatch[1];
      const vars = [];
      const varMatches = selectPart.matchAll(/\?(\w+)/g);
      for (const m of varMatches) {
        vars.push(m[1]);
      }
      return vars;
    }

    function updateSortControls() {
      const sparql = editor.value.trim();
      const vars = extractSelectVars(sparql);
      const sortItemsEl = document.getElementById("sort-items");
      sortItemsEl.innerHTML = "";
      
      if (vars.length === 0) return;
      
      // Single dropdown to select variable
      const selectDiv = document.createElement("div");
      selectDiv.style.display = "flex";
      selectDiv.style.gap = ".5rem";
      selectDiv.style.alignItems = "center";
      selectDiv.style.marginBottom = ".5rem";
      
      const dropdown = document.createElement("select");
      dropdown.id = "sort-var-select";
      dropdown.innerHTML = '<option value="">Select variable...</option>' + 
        vars.map(v => `<option value="${v}">${v}</option>`).join("");
      
      const dirSelect = document.createElement("select");
      dirSelect.id = "sort-dir-select";
      dirSelect.innerHTML = '<option value="ASC">ASC</option><option value="DESC">DESC</option>';
      
      const addBtn = document.createElement("button");
      addBtn.textContent = "Add";
      addBtn.style.padding = ".2rem .6rem";
      addBtn.style.fontSize = ".75rem";
      addBtn.style.background = "var(--bg-dark)";
      addBtn.style.color = "#fff";
      addBtn.style.border = "none";
      addBtn.style.borderRadius = "3px";
      addBtn.style.cursor = "pointer";
      
      addBtn.addEventListener("click", () => {
        const varName = dropdown.value;
        if (varName) {
          addSortItem(varName, dirSelect.value, listsDiv);
          dropdown.value = "";
          dropdown.focus();
        }
      });
      
      selectDiv.appendChild(dropdown);
      selectDiv.appendChild(dirSelect);
      selectDiv.appendChild(addBtn);
      sortItemsEl.appendChild(selectDiv);
      
      // Container for selected sort items
      const listsDiv = document.createElement("div");
      listsDiv.id = "sort-list";
      sortItemsEl.appendChild(listsDiv);
      
      dropdown.focus();
    }

    function addSortItem(varName, dir, containerEl) {
      const div = document.createElement("div");
      div.className = "sort-item";
      div.style.display = "flex";
      div.style.alignItems = "center";
      div.style.gap = ".5rem";
      div.style.marginBottom = ".3rem";
      
      const label = document.createElement("span");
      label.textContent = varName;
      label.style.minWidth = "60px";
      
      const dirSelect = document.createElement("select");
      dirSelect.innerHTML = '<option value="ASC">ASC</option><option value="DESC">DESC</option>';
      dirSelect.value = dir;
      dirSelect.addEventListener("change", rebuildOrderBy);
      
      const removeBtn = document.createElement("button");
      removeBtn.textContent = "×";
      removeBtn.style.padding = "0 .4rem";
      removeBtn.style.fontSize = ".9rem";
      removeBtn.style.background = "#ccc";
      removeBtn.style.border = "none";
      removeBtn.style.borderRadius = "2px";
      removeBtn.style.cursor = "pointer";
      removeBtn.addEventListener("click", () => {
        div.remove();
        rebuildOrderBy();
      });
      
      div.appendChild(label);
      div.appendChild(dirSelect);
      div.appendChild(removeBtn);
      containerEl.appendChild(div);
      
      rebuildOrderBy();
    }

    function rebuildOrderBy() {
      const sortItems = Array.from(document.querySelectorAll("#sort-list .sort-item"));
      const clauses = sortItems.map(item => {
        const label = item.querySelector("span").textContent;
        const dir = item.querySelector("select").value;
        return `${dir}(?${label})`;
      });
      
      if (clauses.length === 0) return;
      
      let sparql = editor.value;
      // Remove existing ORDER BY clause (but keep LIMIT if it exists)
      sparql = sparql.replace(/ORDER BY\s+.*?(?=\s*(?:LIMIT|$))/im, "").trim();
      
      // Add new ORDER BY before LIMIT or at the end
      if (sparql.match(/LIMIT/i)) {
        sparql = sparql.replace(/(\s*LIMIT)/i, "\nORDER BY " + clauses.join(" ") + "\n$1");
      } else {
        sparql += "\nORDER BY " + clauses.join(" ");
      }
      
      editor.value = sparql;
    }

    /* ── Build sidebar ── */
    const queriesEl = document.getElementById("queries");
    const editor = document.getElementById("sparql-input");
    
    const runBtn = document.getElementById("run-btn");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results-area");
    const loadingBar = document.getElementById("loading-bar");
    let pendingSavedQueryRun = false;
    let rdfStore = null;

    SAVED_QUERIES.forEach((q) => {
      const btn = document.createElement("button");
      btn.className = "query-btn";
      btn.textContent = q.title;
      btn.addEventListener("click", () => {
        queriesEl.querySelectorAll(".query-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        editor.value = q.sparql;
        updateSortControls();
        if (rdfStore) {
          runQuery();
        } else {
          pendingSavedQueryRun = true;
        }
      });
      queriesEl.appendChild(btn);
    });

    // Select first query
    queriesEl.querySelector(".query-btn").click();

    /* ── Init Oxigraph + pre-load dataset ── */
    (async () => {
      try {
        statusEl.textContent = "Loading Oxigraph WASM…";
        await oxiInit();
        statusEl.textContent = "Loading dataset…";
        const ttlText = await fetch(TTL_URL).then(r => r.text());
        rdfStore = new oxigraph.Store();
        rdfStore.load(ttlText, { format: "ttl", base_iri: window.location.href });
        statusEl.textContent = `Ready — ${rdfStore.size.toLocaleString()} triples loaded. Ctrl+Enter to run.`;
        runBtn.disabled = false;
        if (pendingSavedQueryRun) {
          pendingSavedQueryRun = false;
          runQuery();
        }
      } catch (e) {
        statusEl.textContent = "Init failed: " + e.message;
      }
    })();

    /* ── Row renderer ── */
    function appendRow(tbody, b, vars, numVars) {
      const row = tbody.insertRow();
      vars.forEach(v => {
        const td = row.insertCell();
        const term = b[v];
        if (!term) return;
        if (term.termType === "NamedNode") {
          td.className = "uri";
          const a = document.createElement("a");
          const uriParam = (() => { try { return new URL(term.value).searchParams.get("uri"); } catch { return null; } })();
          a.textContent = (uriParam ?? term.value.replace(/^.*[/#]/, "")).replace(/^(?:ecli:|CELEX:)/i, "");
          a.title = term.value;
          if (isEcliUri(term.value)) {
            a.href = "#";
            a.className = "id-link";
            a.addEventListener("click", (e) => {
              e.preventDefault();
              editor.value = buildFilterQuery(term.value);
              queriesEl.querySelectorAll(".query-btn").forEach(b => b.classList.remove("active"));
              updateSortControls();
              runQuery();
            });
          } else {
            a.href = term.value;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
          }
          td.appendChild(a);
        } else {
          if (numVars.has(v)) td.className = "num";
          td.textContent = term.value;
        }
      });
    }

    /* ── Run query ── */
    let currentQueryId = 0;

    runBtn.addEventListener("click", runQuery);
    editor.addEventListener("keydown", e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") runQuery();
    });

    async function runQuery() {
      if (!rdfStore) return;
      const sparql = editor.value.trim();
      if (!sparql) return;

      const queryId = ++currentQueryId;

      runBtn.disabled = true;
      loadingBar.style.display = "block";
      statusEl.textContent = "Querying…";
      resultsEl.innerHTML = "";

      try {
        const result = rdfStore.query(sparql);
        if (queryId !== currentQueryId) return;
        if (!Array.isArray(result)) {
          throw new Error("Only SELECT queries are supported in this UI.");
        }

        const bindings = result.map((binding) => {
          const row = {};
          for (const [key, value] of binding.entries()) {
            const name = (typeof key === "string")
              ? key.replace(/^\?/, "")
              : ((key && key.value) ? key.value.replace(/^\?/, "") : String(key).replace(/^\?/, ""));
            row[name] = value;
          }
          return row;
        });

        if (bindings.length === 0) {
          resultsEl.innerHTML = '<p id="no-results">No results.</p>';
          statusEl.textContent = "0 results.";
          return;
        }

        let table = null, tbody = null;
        const vars = Object.keys(bindings[0]);
        const numVars = new Set();
        let count = bindings.length;
        const CHUNK = 50;
        let pending = bindings.slice();

        table = document.createElement("table");
        const thead = table.createTHead();
        const hrow = thead.insertRow();
        vars.forEach(v => {
          const th = document.createElement("th");
          th.textContent = v;
          hrow.appendChild(th);
        });
        tbody = table.createTBody();
        resultsEl.appendChild(table);

        bindings.forEach(b => {
          vars.forEach(v => {
            const t = b[v];
            if (t && t.termType === "Literal" && !isNaN(t.value)) numVars.add(v);
          });
        });

        const flush = () => {
          const chunk = pending.splice(0, CHUNK);
          for (const b of chunk) appendRow(tbody, b, vars, numVars);
        };

        while (pending.length > 0) {
          if (queryId !== currentQueryId) return;
          flush();
          statusEl.textContent = `${count - pending.length} / ${count} result(s)…`;
          await new Promise(r => setTimeout(r, 0));
        }

        statusEl.textContent = `${count} result(s).`;
      } catch (e) {
        if (queryId !== currentQueryId) return;
        resultsEl.innerHTML = `<p class="err">Error: ${e.message}</p>`;
        statusEl.textContent = "Query failed.";
      } finally {
        if (queryId === currentQueryId) {
          runBtn.disabled = false;
          loadingBar.style.display = "none";
        }
      }
    }
  </script>
</body>

</html>
